<!-- 부모는 글래스 스타일. 내부는 div만 사용 -->
<div
  style="
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    min-width: 0;
  "
>
  <!-- 아이콘 24×24 -->
  <div
    style="
      flex: 0 0 24px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(
          #060c24 0 120deg,
          rgba(6, 12, 36, 0.25) 120deg 360deg
        ),
        radial-gradient(
          circle at 50% 50%,
          #fffee0 0%,
          #faf7ca 56%,
          #e4a47a 100%
        );
      background-clip: padding-box, content-box;
    "
  ></div>

  <!-- 텍스트 + 시간(하단 배치) -->
  <div
    style="
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
    "
  >
    <div
      style="
        font-weight: 700;
        font-size: 14px;
        line-height: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      "
    >
      거래 대기중
    </div>
    <div
      style="
        opacity: 0.9;
        font-weight: 500;
        font-size: 12px;
        line-height: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      "
    >
      Click me to celebrate!
    </div>
    <!-- 시간: 하단 우측 정렬 -->
  </div>
  <div
    style="
      margin-top: 2px;
      font-size: 12px;
      line-height: 1;
      color: #d9d9da;
      white-space: nowrap;
      align-self: flex-end;
    "
  >
    오전 11:23
  </div>
</div>
